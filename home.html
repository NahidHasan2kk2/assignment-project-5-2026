<body>

 <header>
  <div class="navbar bg-base-100 shadow-sm">
   <div class="flex-1">
    <div class="flex items-center">
     <img class="w-10" src="./assets/github-logo.png" alt="">
     <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
    </div>
   </div>
   <div class="flex gap-2 relative">
    <div class="">
     <i class="fa-solid z-5 absolute left-2 top-3 fa-magnifying-glass"></i>
     <input type="text" placeholder="         Search" class="input input-bordered pr-20 w-24 md:w-auto" />
    </div>
    <div>
     <i class="fa-solid absolute top-3 left-60 text-white z-5 fa-plus"></i>
     <button class="btn pl-10 btn-primary"> New issue</button>
    </div>

   </div>
  </div>
 </header>
 <section class="border-gray-300 bg-gray-200 rounded w-3/4 mx-auto pl-2 py-3 mt-5 shadow-xl">
  <button onclick="switchTab('all')" id="all-tab" class="btn px-10">All</button>
  <button onclick="switchTab('open')" id="open-tab" class="btn px-10">Open</button>
  <button onclick="switchTab('closed')" id="closed-tab" class="btn px-10">Closed</button>
 </section>


 <section class="border-gray-300 bg-gray-200 rounded w-3/4 mx-auto px-4 py-3 mt-5 shadow-xl">
  <div class="flex justify-between items-center">
   <div class="flex items-center">
    <img class="h-[70%] bg-blue-50 p-2 rounded-full" src="./assets/Aperture.png" alt="">
    <div class="ml-5">
     <h1 class="text-2xl font-semibold"><span id="count-issue">50</span> Issue</h1>
     <p class="text-[#64748B] font-bold">Track and manage your project issues</p>
    </div>
   </div>
   <div class="flex gap-3">
    <div class="flex gap-2">
     <img src="./assets/open.status.png" alt="">
     <p>Open</p>
    </div>
    <div class="flex gap-2">
     <img src="./assets/closed.status.png" alt="">
     <p>Closed</p>
    </div>
   </div>
  </div>
 </section>

 <div id="cards-container" class="cards w-3/4 mx-auto grid mt-2 grid-cols-3 gap-5">

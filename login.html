<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Login Form</title>
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
 <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link
  href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
  rel="stylesheet">
 <link rel="stylesheet" href="./styles/styles.css">

</head>

<body>
 <section class="flex justify-center items-center py-20">
  <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
   <legend class="fieldset-legend"></legend>
   <div class="text-center space-y-3">
    <img class="mx-auto" src="./assets/github-logo.png" alt="">
    <h1 class="font-semibold text-2xl text-[#1F2937]">GitHub Issues Tracker</h1>
    <p class="text-[#64748B] font-semibold">Sign in to manage your issues</p>
   </div>
   <label class="label">User Name</label>
   <input id="user-input-field" type="email" class="input" placeholder="Enter User Name" />

   <label class="label">Password</label>
   <input id="password-input-field" type="password" class="input" placeholder="Password" />

   <button id="login-btn" class="btn btn-neutral mt-4">Login</button>

   <div class="flex items-center my-6">
    <div class="flex-grow border-t border-gray-300"></div>
    <span class="mx-4 text-gray-500">OR</span>
    <div class="flex-grow border-t border-gray-300"></div>
   </div>
   <div class="text-center space-y-1">
    <p class="text-[#64748B] font-bold border">Demo Credentials:</p>
    <p><span class="font-bold text-black">User Name:</span> admin</p>
    <p><span class="font-bold text-black">Password:</span> admin123</p>
   </div>
  </fieldset>
 </section>

 <script src="./js/login.js"></script>
</body>

</html>
